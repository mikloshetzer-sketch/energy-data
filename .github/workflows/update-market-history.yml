name: Update market history

on:
  schedule:
    - cron: "25,55 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-market-history:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run market history updater
        run: python update_market_history.py

      - name: Commit updated market history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add market-history.json
          git diff --cached --quiet || git commit -m "Update market history"
          git push
