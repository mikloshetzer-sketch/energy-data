name: Update Brent Outlook

on:
  # Kézi indítás a GitHub Actions felületéről.
  workflow_dispatch:

  # Automatikus indítás minden sikeres OMPI-frissítés után.
  workflow_run:
    workflows:
      - Update OMPI
    types:
      - completed

  # Napi biztonsági futtatás.
  # 07:15 UTC = nyári időszámításkor 09:15,
  # téli időszámításkor 08:15 magyar idő szerint.
  schedule:
    - cron: "15 7 * * *"

  # Közvetlen indítás csak akkor, ha maga a generátor
  # vagy ez a workflow változik.
  push:
    branches:
      - main
    paths:
      - "scripts/generate_brent_outlook.py"
      - ".github/workflows/update-brent-outlook.yml"

permissions:
  contents: write

concurrency:
  group: update-brent-outlook
  cancel-in-progress: false

jobs:
  generate-brent-outlook:
    name: Generate Brent Outlook

    # Workflow-run esetén csak sikeres OMPI-futás után induljon.
    if: >
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'

    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Synchronize repository
        shell: bash
        run: |
          set -euo pipefail

          git fetch origin main
          git checkout main
          git reset --hard origin/main

      - name: Show trigger information
        shell: bash
        run: |
          echo "Event: ${{ github.event_name }}"

          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            echo "Upstream workflow: ${{ github.event.workflow_run.name }}"
            echo "Upstream conclusion: ${{ github.event.workflow_run.conclusion }}"
          fi

      - name: Show available input files
        shell: bash
        run: |
          set -euo pipefail

          echo "Repository root:"
          pwd

          echo ""
          echo "Available OMPI files:"
          find . -maxdepth 4 -type f -name "ompi.json" -print || true

          echo ""
          echo "Available live-market files:"
          find . -maxdepth 4 -type f -name "live-market.json" -print || true

          echo ""
          echo "Available market-history files:"
          find . -maxdepth 4 -type f -name "market-history.json" -print || true

      - name: Validate required files
        shell: bash
        run: |
          set -euo pipefail

          if [ ! -f "scripts/generate_brent_outlook.py" ]; then
            echo "::error::Missing scripts/generate_brent_outlook.py"
            exit 1
          fi

          if [ ! -f "docs/data/ompi.json" ]; then
            echo "::error::Missing docs/data/ompi.json"
            exit 1
          fi

          python -m py_compile scripts/generate_brent_outlook.py
          python -m json.tool docs/data/ompi.json > /dev/null

          echo "Required Brent Outlook inputs are valid."

      - name: Generate Brent Outlook
        shell: bash
        run: |
          set -euo pipefail

          python scripts/generate_brent_outlook.py \
            --project-root "${GITHUB_WORKSPACE}" \
            --output "docs/data/brent-outlook.json" \
            --history-output "docs/data/brent-outlook-history.json"

      - name: Validate generated JSON
        shell: bash
        run: |
          set -euo pipefail

          python - <<'PY'
          import json
          import math
          from pathlib import Path


          outlook_path = Path("docs/data/brent-outlook.json")
          history_path = Path("docs/data/brent-outlook-history.json")

          for path in (outlook_path, history_path):
              if not path.exists():
                  raise SystemExit(f"Missing generated file: {path}")

              with path.open("r", encoding="utf-8") as handle:
                  payload = json.load(handle)

              if not payload:
                  raise SystemExit(f"Generated JSON is empty: {path}")

          with outlook_path.open("r", encoding="utf-8") as handle:
              outlook = json.load(handle)

          required_top_level = {
              "generated_at",
              "dataset",
              "horizon_days",
              "current",
              "outlook",
              "signals",
              "quality",
              "methodology",
          }

          missing = required_top_level - set(outlook)
          if missing:
              raise SystemExit(
                  "Missing required Brent Outlook fields: "
                  + ", ".join(sorted(missing))
              )

          if outlook.get("dataset") != "brent_outlook":
              raise SystemExit(
                  "Unexpected dataset value in brent-outlook.json: "
                  f"{outlook.get('dataset')!r}"
              )

          current_price = outlook["current"].get("price_usd")
          lower_price = outlook["outlook"].get("lower_price_usd")
          center_price = outlook["outlook"].get("center_price_usd")
          upper_price = outlook["outlook"].get("upper_price_usd")
          ompi_score = outlook["signals"].get("ompi_score")

          numeric_values = {
              "current_price": current_price,
              "lower_price": lower_price,
              "center_price": center_price,
              "upper_price": upper_price,
              "ompi_score": ompi_score,
          }

          for name, value in numeric_values.items():
              if not isinstance(value, (int, float)):
                  raise SystemExit(f"Invalid {name}: {value!r}")

              if not math.isfinite(value):
                  raise SystemExit(f"Non-finite {name}: {value!r}")

          for name, value in {
              "current_price": current_price,
              "lower_price": lower_price,
              "center_price": center_price,
              "upper_price": upper_price,
          }.items():
              if value <= 0:
                  raise SystemExit(f"Invalid {name}: {value!r}")

          if not 0 <= ompi_score <= 100:
              raise SystemExit(
                  f"OMPI score must be between 0 and 100: {ompi_score!r}"
              )

          if not lower_price <= center_price <= upper_price:
              raise SystemExit(
                  "Invalid Brent Outlook range: "
                  "expected lower_price <= center_price <= upper_price"
              )

          print("Brent Outlook JSON validation passed.")
          print(f"OMPI: {ompi_score:.1f}")
          print(f"Current Brent: ${current_price:.2f}")
          print(
              f"Outlook range: "
              f"${lower_price:.2f}–${upper_price:.2f}"
          )
          print(
              f"Direction: {outlook['outlook'].get('direction')} | "
              f"Confidence: {outlook['outlook'].get('confidence')}"
          )
          PY

      - name: Show generated changes
        shell: bash
        run: |
          git status --short

          git diff -- \
            docs/data/brent-outlook.json \
            docs/data/brent-outlook-history.json \
            || true

      - name: Commit generated files
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email \
            "41898282+github-actions[bot]@users.noreply.github.com"

          git add \
            docs/data/brent-outlook.json \
            docs/data/brent-outlook-history.json

          if git diff --cached --quiet; then
            echo "No Brent Outlook changes to commit."
            exit 0
          fi

          git commit -m "data: update Brent Outlook"

          git pull --rebase origin main
          git push origin HEAD:main
