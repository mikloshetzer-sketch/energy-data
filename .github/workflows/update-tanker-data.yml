name: Update tanker data

on:
  schedule:
    - cron: "50 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-tanker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tanker updater
        env:
          AISSTREAM_API_KEY: ${{ secrets.AISSTREAM_API_KEY }}
        run: python update_tanker_data.py

      - name: Commit updated data files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tanker-data.json tanker-static-cache.json
          git diff --cached --quiet || git commit -m "Update tanker data"
          git push
