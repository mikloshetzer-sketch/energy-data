name: Update global oil balance

on:
  workflow_dispatch:

  schedule:
    # Az EIA STEO havi adat. A napi futás biztosítja, hogy az új havi
    # publikáció rövid időn belül bekerüljön a repóba.
    # GitHub Actions cron UTC időzónát használ.
    - cron: "42 6 * * *"

permissions:
  contents: write

concurrency:
  group: update-global-oil-balance
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Repository checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Python beállítása
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Függőségek telepítése
        run: |
          python -m pip install --upgrade pip
          python -m pip install requests

      - name: Globális fizikai mérleg frissítése
        env:
          EIA_API_KEY: ${{ secrets.EIA_API_KEY }}
        run: python scripts/update_global_oil_balance.py

      - name: Rövid távú piaci nyomás frissítése
        run: python scripts/generate_supply_demand_balance.py

      - name: JSON-fájlok ellenőrzése
        run: |
          python -m json.tool docs/data/global_oil_balance.json > /dev/null
          python -m json.tool docs/data/supply_demand_balance.json > /dev/null

      - name: Változások mentése
        shell: bash
        run: |
          if git diff --quiet -- \
            docs/data/global_oil_balance.json \
            docs/data/supply_demand_balance.json; then
            echo "Nincs mentendő változás."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email \
            "41898282+github-actions[bot]@users.noreply.github.com"

          git add \
            docs/data/global_oil_balance.json \
            docs/data/supply_demand_balance.json

          git commit -m "Update global oil balance and market pressure"
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push origin "HEAD:${GITHUB_REF_NAME}"

