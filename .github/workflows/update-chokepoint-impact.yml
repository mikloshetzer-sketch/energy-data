name: Update chokepoint impact

on:
  schedule:
    - cron: "20,50 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-chokepoint-impact:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies (if needed)
        run: |
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run chokepoint impact updater
        run: python update_chokepoint_impact.py

      - name: Commit updated impact + history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add chokepoint-impact.json chokepoint-impact-history.json
          git diff --cached --quiet || git commit -m "Update chokepoint impact + history data"
          git push
