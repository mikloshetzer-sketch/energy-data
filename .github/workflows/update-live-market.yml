name: Update market price snapshot

on:
  workflow_dispatch:

  schedule:
    # GitHub Actions cron UTC időzónát használ.
    # A GitHub az ütemezett futásokat terhelés esetén késleltetheti.
    - cron: "7,37 * * * *"

permissions:
  contents: write

concurrency:
  group: update-market-price-snapshot
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Repository checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Python beállítása
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Függőségek telepítése
        run: |
          python -m pip install --upgrade pip
          python -m pip install requests

      - name: Piaci pillanatkép frissítése
        env:
          OILPRICEAPI_KEY: ${{ secrets.OILPRICEAPI_KEY }}
        run: python update_live_market.py

      - name: JSON ellenőrzése
        run: |
          python -m json.tool live-market.json > /dev/null

      - name: Változások mentése
        shell: bash
        run: |
          if git diff --quiet -- live-market.json; then
            echo "Nincs mentendő változás."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email \
            "41898282+github-actions[bot]@users.noreply.github.com"

          git add live-market.json
          git commit -m "Update market price snapshot"
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push origin "HEAD:${GITHUB_REF_NAME}"
