name: Update live market

on:
  schedule:
    - cron: "15 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-live-market:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run live market updater
        run: python update_live_market.py

      - name: Generate market interpretation
        run: python scripts/generate_market_interpretation.py

      - name: Generate risk drivers
        run: python scripts/generate_risk_drivers.py

      - name: Generate historical context
        run: python scripts/generate_historical_context.py

      - name: Generate energy forecast
        run: python scripts/generate_energy_forecast.py

      - name: Generate chokepoint status
        run: python scripts/generate_chokepoint_status.py

      - name: Generate china exposure
        run: python scripts/generate_china_exposure.py

      - name: Generate inventory stress
        run: python scripts/generate_inventory_stress.py

      - name: Commit updated live market intelligence data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add live-market.json
          git add docs/data/market_interpretation.json
          git add docs/data/risk_drivers.json
          git add docs/data/historical_context.json
          git add docs/data/energy_forecast.json
          git add docs/data/chokepoint_status.json
          git add docs/data/china_exposure.json
          git add docs/data/inventory_stress.json

          git diff --cached --quiet || git commit -m "Update live market intelligence data"
          git push
