name: Update oil data

on:
  workflow_dispatch:
  schedule:
    - cron: "15 6 * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:

      - name: Repo letöltése
        uses: actions/checkout@v4

      - name: Python telepítése
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Python csomagok telepítése
        run: pip install requests

      - name: Olajadatok frissítése
        env:
          EIA_API_KEY: ${{ secrets.EIA_API_KEY }}
        run: python update_oil_data.py

      - name: Commit és push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add oil-data.json
          git diff --cached --quiet || git commit -m "Automatikus oil-data frissítés"
          git push
