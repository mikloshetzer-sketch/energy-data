name: Update China Crude Import Volume

on:
  workflow_dispatch:
  schedule:
    # JODI is monthly, but a daily check captures new releases automatically.
    # 05:45 UTC = 07:45 CEST / 06:45 CET in Hungary.
    - cron: "45 5 * * *"

permissions:
  contents: write

concurrency:
  group: update-china-crude-import-volume
  cancel-in-progress: false

jobs:
  update-china-crude-import-volume:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Update China crude import volume
        run: python scripts/update_china_crude_import_volume.py

      - name: Validate generated JSON
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          path = Path("docs/data/china_crude_import_volume.json")
          if not path.exists():
              raise SystemExit("docs/data/china_crude_import_volume.json was not generated")

          data = json.loads(path.read_text(encoding="utf-8"))
          required = {"generated_at", "dataset", "source", "coverage", "latest", "series"}
          missing = required.difference(data)
          if missing:
              raise SystemExit(f"Missing top-level fields: {sorted(missing)}")

          series = data.get("series")
          if not isinstance(series, list) or not series:
              raise SystemExit("Generated series is empty")

          if data.get("dataset") != "china_crude_import_volume":
              raise SystemExit("Unexpected dataset identifier")

          print(f"Validated {len(series)} monthly observations")
          print(f"Latest period: {data['latest']['period']}")
          PY

      - name: Commit updated data
        run: |
          if git diff --quiet -- docs/data/china_crude_import_volume.json; then
            echo "No data change detected"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/data/china_crude_import_volume.json
          git commit -m "Update China crude import volume from JODI"
          git push

