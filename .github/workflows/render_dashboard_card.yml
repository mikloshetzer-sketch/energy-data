name: Render Energy Dashboard Card

on:
  workflow_dispatch:

  schedule:
    - cron: "15 */6 * * *"

permissions:
  contents: write

jobs:
  render-card:
    runs-on: ubuntu-latest

    steps:
      - name: Repository letöltése
        uses: actions/checkout@v4

      - name: Python telepítése
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Node.js telepítése
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Playwright telepítése
        run: |
          npm install -g playwright
          playwright install chromium
          playwright install-deps

      - name: Python függőségek
        run: |
          pip install playwright

      - name: Dashboard PNG renderelése
        run: |
          python scripts/render_energy_dashboard_card.py

      - name: Változások commitolása
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add docs/assets/energy-dashboard-card.png

          git commit -m "Dashboard card frissítése" || echo "Nincs változás"

          git push
